name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  GO_VERSION: "1.23"
  RCLONE_VERSION: "v1.68.2"

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Test
        run: go test ./...

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev zip unzip curl dpkg-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Nextclone
        run: |
          mkdir -p dist rclone-linux
          version="$(tr -d '[:space:]' < VERSION)"
          go build -trimpath -ldflags "-s -w -X github.com/marvinscham/nextclone/internal/version.Version=${version}" -o dist/nextclone-linux-amd64 ./cmd/nextclone

      - name: Bundle rclone
        run: |
          curl -L "https://downloads.rclone.org/${RCLONE_VERSION}/rclone-${RCLONE_VERSION}-linux-amd64.zip" -o /tmp/rclone-linux.zip
          unzip -q /tmp/rclone-linux.zip -d rclone-linux
          cp rclone-linux/rclone-*-linux-amd64/rclone dist/rclone-linux-amd64
          chmod +x dist/nextclone-linux-amd64 dist/rclone-linux-amd64 packaging/linux/nextclone scripts/package-deb.sh

      - name: Package .deb
        run: sh scripts/package-deb.sh "${GITHUB_REF_NAME#v}"

      - name: Package Linux zip
        run: zip -j "dist/nextclone_${GITHUB_REF_NAME}_linux_amd64.zip" dist/nextclone-linux-amd64 dist/rclone-linux-amd64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/nextclone-linux-amd64
            dist/rclone-linux-amd64
            dist/nextclone_*_linux_amd64.deb
            dist/nextclone_*_linux_amd64.zip

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Nextclone
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist, rclone-windows | Out-Null
          $env:Path = "C:\msys64\mingw64\bin;$env:Path"
          $env:CGO_ENABLED = "1"
          $env:CC = "gcc"
          $version = (Get-Content VERSION -Raw).Trim()
          go build -trimpath -ldflags "-s -w -X github.com/marvinscham/nextclone/internal/version.Version=$version -H windowsgui" -o dist/nextclone-windows-amd64.exe ./cmd/nextclone

      - name: Bundle rclone
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://downloads.rclone.org/${env:RCLONE_VERSION}/rclone-${env:RCLONE_VERSION}-windows-amd64.zip" -OutFile "$env:TEMP\rclone-windows.zip"
          Expand-Archive -Path "$env:TEMP\rclone-windows.zip" -DestinationPath rclone-windows -Force
          Copy-Item "rclone-windows\rclone-*-windows-amd64\rclone.exe" dist\rclone.exe

      - name: Package Windows zip
        shell: pwsh
        run: Compress-Archive -Path dist\nextclone-windows-amd64.exe, dist\rclone.exe -DestinationPath "dist\nextclone_${env:GITHUB_REF_NAME}_windows_amd64.zip" -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/nextclone-windows-amd64.exe
            dist/rclone.exe
            dist/nextclone_*_windows_amd64.zip

  release:
    name: Publish Release
    runs-on: ubuntu-22.04
    needs:
      - build-linux
      - build-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          version="${GITHUB_REF_NAME}"
          if [[ "$version" != v* ]]; then
            version="v$(tr -d '[:space:]' < VERSION)"
          fi
          scripts/generate-changelog.sh --version "$version" --section-only --output release-notes.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Nextclone ${{ github.ref_name }}
          body_path: release-notes.md
          files: release-assets/*
