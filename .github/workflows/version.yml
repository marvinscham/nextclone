name: Version

on:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write

jobs:
  bump:
    name: Bump Version
    runs-on: ubuntu-22.04
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Calculate next version
        id: semver
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list 'v[0-9]*' --sort=-v:refname | head -n 1)"
          if [ -n "$latest_tag" ]; then
            current="${latest_tag#v}"
            range="${latest_tag}..HEAD"
          else
            current="$(tr -d '[:space:]' < VERSION)"
            range="HEAD"
          fi

          messages="$(git log --format=%B "$range")"
          bump="none"
          if printf '%s\n' "$messages" | grep -Eq '^BREAKING[- ]CHANGE:|^[a-zA-Z]+(\([^)]+\))?!:'; then
            bump="major"
          elif printf '%s\n' "$messages" | grep -Eq '^feat(\([^)]+\))?:'; then
            bump="minor"
          elif printf '%s\n' "$messages" | grep -Eq '^(fix|perf|revert)(\([^)]+\))?:'; then
            bump="patch"
          fi

          if [ "$bump" = "none" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          IFS=. read -r major minor patch <<< "$current"
          case "$bump" in
            major)
              major=$((major + 1)); minor=0; patch=0 ;;
            minor)
              minor=$((minor + 1)); patch=0 ;;
            patch)
              patch=$((patch + 1)) ;;
          esac

          next="${major}.${minor}.${patch}"
          echo "$next" > VERSION
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version=$next" >> "$GITHUB_OUTPUT"

      - name: Commit and tag version
        if: steps.semver.outputs.skip == 'false'
        run: |
          version="${{ steps.semver.outputs.version }}"
          scripts/generate-changelog.sh --version "v${version}"
          git add VERSION CHANGELOG.md
          git commit -m "chore(release): v${version}"
          git tag "v${version}"
          git push origin HEAD:main "v${version}"

      - name: Start release workflow
        if: steps.semver.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run release.yml --ref "v${{ steps.semver.outputs.version }}"

      - name: Merge version bump back to develop
        if: steps.semver.outputs.skip == 'false'
        run: |
          version="${{ steps.semver.outputs.version }}"
          git fetch origin develop
          git switch -C develop origin/develop
          git merge --no-edit "v${version}"
          git push origin develop
